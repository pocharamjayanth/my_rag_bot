repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        name: Stage 1: Linting (Ruff)
      - id: ruff-format
        name: Stage 2: Formatting (Ruff-Format)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Stage 3: Type Checking (Mypy)

  - repo:$hooksContent = @'
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        name: Stage 1: Linting (Ruff)
      - id: ruff-format
        name: Stage 2: Formatting (Ruff-Format)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Stage 3: Type Checking (Mypy)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: Stage 7: Static Analysis (Bandit)
        args: ["-r", ".", "-x", "venv/"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.2
    hooks:
      - id: pip-audit
        name: Stage 5: Dependency Audit (pip-audit)
        args: ["-r", "requirements.txt"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: Stage 6: Secret Scanning (gitleaks)