repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        name: "Stage 1: Linting (Ruff)"
      - id: ruff-format
        name: "Stage 2: Formatting (Ruff-Format)"

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: "Stage 3: Type Checking (Mypy)"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: "Stage 4: Security Analysis (Bandit)"
        args: ["-r", ".", "-x", "venv/"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        name: "Stage 5: Syntax Upgrades (Pyupgrade)"
        args: [--py313-plus]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: "Stage 6: Style Enforcement (Flake8)"
        args: ["--max-line-length=88", "--exclude=venv"]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        name: "Stage 7: Dead Code Detection (Vulture)"
        args: [".", "--exclude", "venv"]

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.1.0
    hooks:
      - id: pylint
        name: "Stage 8: Strict Code Analysis (Pylint)"
        args: ["--errors-only", "--ignore=venv"]

  - repo: https://github.com/semgrep/semgrep
    rev: v1.65.0
    hooks:
      - id: semgrep
        name: "Stage 9: SAST Scanning (Semgrep)"
        args: ["--config=p/python", "--error", "--exclude=venv"]
